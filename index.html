<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV 키워드 추출기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #fafafa;
      color: #111;
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    input[type="file"],
    input[type="text"],
    select,
    button,
    textarea {
      font-family: inherit;
    }

    input[type="text"],
    select {
      width: 100%;
      max-width: 520px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
    }

    button:hover {
      background: #f3f3f3;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
      background: white;
    }

    .count {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .empty {
      color: #999;
    }

    .result-item,
    .saved-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .keyword {
      font-weight: 700;
      word-break: break-all;
      font-size: 18px;
    }

    .meta {
      font-size: 13px;
      color: #666;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      margin-right: 6px;
      background: #f2f2f2;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .add-btn {
      background: #eef7ff;
      border-color: #b9ddff;
    }

    .remove-btn {
      background: #fff2f2;
      border-color: #ffcaca;
    }

    .copy-box {
      width: 100%;
      min-height: 100px;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .control-group label {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .debug {
      font-size: 12px;
      color: #666;
      background: #f8f8f8;
      border: 1px dashed #ddd;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
      margin-top: 10px;
    }

    .group-box {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fcfcfc;
    }

    .group-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .group-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .group-chip {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f2f2f2;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h2>CSV 키워드 추출기</h2>

  <div class="box">
    <div>CSV 파일 업로드</div>
    <input type="file" id="csvFile" accept=".csv">
    <div id="fileStatus" class="count">아직 업로드된 파일 없음</div>
    <div id="debugInfo" class="debug">헤더 정보 없음</div>
  </div>

  <div class="box">
    <div>검색할 키워드 입력</div>
    <input type="text" id="searchInput" placeholder="예: 여자, 레깅스, 3부, 힙업 여자">

    <div class="top-actions">
      <div class="control-group">
        <label for="sortOption">정렬</label>
        <select id="sortOption">
          <option value="desc">검색수 높은순</option>
          <option value="asc">검색수 낮은순</option>
        </select>
      </div>

      <div class="control-group">
        <label for="maxSearchVolume">검색수 필터</label>
        <select id="maxSearchVolume">
          <option value="0">전체</option>
          <option value="500">500 이하</option>
          <option value="1000">1000 이하</option>
          <option value="5000">5000 이하</option>
          <option value="10000">10000 이하</option>
        </select>
      </div>
    </div>

    <div class="top-actions">
      <button id="searchBtn">검색</button>
      <button id="resetBtn">검색 초기화</button>
    </div>
  </div>

  <div class="box">
    <h3>검색 결과</h3>
    <div id="resultCount" class="count"></div>
    <div id="result"></div>
  </div>

  <div class="box">
    <h3>저장한 키워드</h3>
    <div id="savedCount" class="count">총 0개</div>
    <div class="top-actions">
      <button id="copyBtn">저장 키워드 복사</button>
      <button id="clearBtn">저장 목록 비우기</button>
      <button id="dedupeBtn">중복 제거</button>
      <button id="compressBtn">압축 정리</button>
      <button id="groupBtn">키워드 그룹 보기</button>
    </div>
    <div id="savedList"></div>

    <br>
    <div>복사용 모음</div>
    <textarea id="savedText" class="copy-box" readonly></textarea>
  </div>

  <div class="box">
    <h3>키워드 그룹</h3>
    <div id="groupInfo" class="count">아직 그룹화하지 않음</div>
    <div id="groupResult"></div>
  </div>

  <script>
    let keywords = [];
    let savedKeywords = [];

    const csvFileInput = document.getElementById('csvFile');
    const fileStatus = document.getElementById('fileStatus');
    const debugInfo = document.getElementById('debugInfo');
    const searchInput = document.getElementById('searchInput');
    const sortOption = document.getElementById('sortOption');
    const maxSearchVolume = document.getElementById('maxSearchVolume');
    const result = document.getElementById('result');
    const resultCount = document.getElementById('resultCount');
    const savedList = document.getElementById('savedList');
    const savedCount = document.getElementById('savedCount');
    const savedText = document.getElementById('savedText');
    const groupInfo = document.getElementById('groupInfo');
    const groupResult = document.getElementById('groupResult');

    document.getElementById('searchBtn').addEventListener('click', searchKeywords);
    document.getElementById('resetBtn').addEventListener('click', resetSearch);
    document.getElementById('copyBtn').addEventListener('click', copySavedKeywords);
    document.getElementById('clearBtn').addEventListener('click', clearSavedKeywords);
    document.getElementById('dedupeBtn').addEventListener('click', dedupeSavedKeywords);
    document.getElementById('compressBtn').addEventListener('click', compressSavedKeywords);
    document.getElementById('groupBtn').addEventListener('click', renderKeywordGroups);

    csvFileInput.addEventListener('change', handleCsvUpload);

    searchInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchKeywords();
      }
    });

    sortOption.addEventListener('change', function () {
      if (searchInput.value.trim()) searchKeywords();
    });

    maxSearchVolume.addEventListener('change', function () {
      if (searchInput.value.trim()) searchKeywords();
    });

    function handleCsvUpload(e) {
      const file = e.target.files[0];

      if (!file) {
        alert('CSV 파일을 선택하세요.');
        return;
      }

      const reader = new FileReader();

      reader.onload = function (event) {
        try {
          const text = event.target.result;
          const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');

          if (rows.length === 0) {
            alert('CSV 내용이 비어 있습니다.');
            return;
          }

          const firstRow = parseCSVLine(rows[0]).map(cleanText);
          const hasHeader = guessHasHeader(firstRow);

          let startIndex = 0;
          let headerInfo = '헤더 없음으로 처리됨';

          if (hasHeader) {
            startIndex = 1;
            headerInfo = '헤더 감지: ' + firstRow.join(' | ');
          } else {
            headerInfo = '헤더 없음으로 처리됨 / 첫 행도 데이터로 읽음';
          }

          keywords = [];

          for (let i = startIndex; i < rows.length; i++) {
            const cols = parseCSVLine(rows[i]).map(cleanText);
            if (cols.length === 0) continue;

            const keyword = cols[0] || '';
            if (!keyword) continue;

            const searchVolumeNumber = sumNumericColumns(cols, 1);
            const searchVolume = String(searchVolumeNumber);

            keywords.push({
              keyword: keyword,
              searchVolume: searchVolume,
              searchVolumeNumber: searchVolumeNumber
            });
          }

          fileStatus.innerText = '업로드 완료: ' + file.name + ' / 총 ' + keywords.length + '개 키워드';
          debugInfo.innerText = headerInfo;

          result.innerHTML = '';
          resultCount.innerText = '';
          groupResult.innerHTML = '';
          groupInfo.innerText = '아직 그룹화하지 않음';

          if (keywords.length === 0) {
            alert('읽을 수 있는 데이터가 없습니다. CSV 구조를 확인해주세요.');
          }
        } catch (error) {
          console.error(error);
          alert('CSV 처리 중 오류가 발생했습니다.');
        }
      };

      reader.onerror = function () {
        alert('파일을 읽는 중 오류가 발생했습니다.');
      };

      reader.readAsText(file, 'UTF-8');
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function cleanText(text) {
      return String(text || '').trim().replace(/^"|"$/g, '');
    }

    function toNumber(value) {
      const n = Number(String(value).replace(/,/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function looksNumeric(value) {
      return /^[\d,\.\-]+$/.test(String(value).trim());
    }

    function sumNumericColumns(cols, startIndex) {
      let total = 0;
      for (let i = startIndex; i < cols.length; i++) {
        const value = cleanText(cols[i]);
        if (looksNumeric(value)) {
          total += toNumber(value);
        }
      }
      return total;
    }

    function guessHasHeader(firstRow) {
      if (!firstRow || firstRow.length === 0) return false;

      const firstCell = cleanText(firstRow[0]).toLowerCase();
      const joined = firstRow.join(' ').toLowerCase();

      if (
        firstCell.includes('키워드') ||
        firstCell.includes('keyword') ||
        joined.includes('검색수') ||
        joined.includes('pc') ||
        joined.includes('mobile') ||
        joined.includes('모바일') ||
        joined.includes('카테고리')
      ) {
        return true;
      }

      return false;
    }

    function normalizeKeyword(text) {
      return String(text).toLowerCase().replace(/\s+/g, '').trim();
    }

    function classifyMatch(keyword, query) {
      const keywordLower = keyword.toLowerCase().trim();
      const queryLower = query.toLowerCase().trim();

      if (!queryLower) return null;

      if (keywordLower === queryLower) {
        return '완전일치';
      }

      if (keywordLower.includes(queryLower)) {
        return '포함일치';
      }

      const parts = queryLower.split(/\s+/).filter(Boolean);
      if (parts.length > 1) {
        const allMatched = parts.every(part => keywordLower.includes(part));
        if (allMatched) {
          return '부분일치';
        }
      }

      if (queryLower.length >= 2 && keywordLower.indexOf(queryLower) !== -1) {
        return '내부단어포함';
      }

      return null;
    }

    function searchKeywords() {
      if (keywords.length === 0) {
        alert('먼저 CSV 파일을 업로드하세요.');
        return;
      }

      const query = searchInput.value.trim();
      if (!query) {
        alert('검색어를 입력하세요.');
        return;
      }

      const sortValue = sortOption.value;
      const maxValue = Number(maxSearchVolume.value);

      const filtered = keywords
        .map(item => {
          const matchType = classifyMatch(item.keyword, query);
          if (!matchType) return null;

          if (maxValue !== 0 && item.searchVolumeNumber > maxValue) {
            return null;
          }

          return {
            keyword: item.keyword,
            searchVolume: item.searchVolume,
            searchVolumeNumber: item.searchVolumeNumber,
            matchType: matchType
          };
        })
        .filter(Boolean);

      const uniqueMap = new Map();
      filtered.forEach(item => {
        const key = normalizeKeyword(item.keyword);
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, item);
        }
      });

      const items = Array.from(uniqueMap.values());

      const priority = {
        '완전일치': 1,
        '포함일치': 2,
        '부분일치': 3,
        '내부단어포함': 4
      };

      items.sort((a, b) => {
        if (priority[a.matchType] !== priority[b.matchType]) {
          return priority[a.matchType] - priority[b.matchType];
        }

        if (sortValue === 'asc') {
          return a.searchVolumeNumber - b.searchVolumeNumber;
        }

        return b.searchVolumeNumber - a.searchVolumeNumber;
      });

      renderResults(items);
    }

    function renderResults(items) {
      if (items.length === 0) {
        resultCount.innerText = '총 0개';
        result.innerHTML = '<div class="empty">일치하는 키워드가 없습니다.</div>';
        return;
      }

      resultCount.innerText = '총 ' + items.length + '개';

      let html = '';
      items.forEach(item => {
        const alreadyAdded = savedKeywords.some(saved => normalizeKeyword(saved.keyword) === normalizeKeyword(item.keyword));

        html += `
          <div class="result-item">
            <div class="left">
              <div class="keyword">${escapeHtml(item.keyword)}</div>
              <div class="meta">
                <span class="tag">${escapeHtml(item.matchType)}</span>
                검색수: ${escapeHtml(String(item.searchVolume))}
              </div>
            </div>
            <div class="actions">
              <button
                class="add-btn"
                data-keyword="${encodeURIComponent(item.keyword)}"
                data-volume="${encodeURIComponent(String(item.searchVolume))}"
                ${alreadyAdded ? 'disabled' : ''}
              >
                ${alreadyAdded ? '추가됨' : '추가'}
              </button>
            </div>
          </div>
        `;
      });

      result.innerHTML = html;

      const addButtons = result.querySelectorAll('.add-btn');
      addButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          addKeyword(this.dataset.keyword, this.dataset.volume);
        });
      });
    }

    function addKeyword(encodedKeyword, encodedSearchVolume) {
      const keyword = decodeURIComponent(encodedKeyword);
      const searchVolume = decodeURIComponent(encodedSearchVolume);

      const exists = savedKeywords.some(item => normalizeKeyword(item.keyword) === normalizeKeyword(keyword));
      if (exists) return;

      savedKeywords.push({
        keyword: keyword,
        searchVolume: searchVolume,
        searchVolumeNumber: toNumber(searchVolume)
      });

      sortSavedKeywords();
      renderSavedKeywords();

      if (searchInput.value.trim()) {
        searchKeywords();
      }
    }

    function removeKeyword(encodedKeyword) {
      const keyword = decodeURIComponent(encodedKeyword);
      savedKeywords = savedKeywords.filter(item => normalizeKeyword(item.keyword) !== normalizeKeyword(keyword));

      sortSavedKeywords();
      renderSavedKeywords();
      renderKeywordGroupsSilently();

      if (searchInput.value.trim()) {
        searchKeywords();
      }
    }

    function sortSavedKeywords() {
      savedKeywords.sort((a, b) => b.searchVolumeNumber - a.searchVolumeNumber);
    }

    function renderSavedKeywords() {
      sortSavedKeywords();
      savedCount.innerText = '총 ' + savedKeywords.length + '개';

      if (savedKeywords.length === 0) {
        savedList.innerHTML = '<div class="empty">저장된 키워드가 없습니다.</div>';
        savedText.value = '';
        return;
      }

      let html = '';
      savedKeywords.forEach(item => {
        html += `
          <div class="saved-item">
            <div class="left">
              <div class="keyword">${escapeHtml(item.keyword)}</div>
              <div class="meta">검색수: ${escapeHtml(String(item.searchVolume))}</div>
            </div>
            <div class="actions">
              <button
                class="remove-btn"
                data-keyword="${encodeURIComponent(item.keyword)}"
              >
                삭제
              </button>
            </div>
          </div>
        `;
      });

      savedList.innerHTML = html;
      savedText.value = savedKeywords.map(item => item.keyword).join(' ');

      const removeButtons = savedList.querySelectorAll('.remove-btn');
      removeButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          removeKeyword(this.dataset.keyword);
        });
      });
    }

    function copySavedKeywords() {
      const text = savedText.value.trim();

      if (!text) {
        alert('복사할 저장 키워드가 없습니다.');
        return;
      }

      navigator.clipboard.writeText(text)
        .then(() => alert('저장 키워드를 복사했습니다.'))
        .catch(() => alert('복사에 실패했습니다.'));
    }

    function clearSavedKeywords() {
      if (savedKeywords.length === 0) return;

      const ok = confirm('저장한 키워드를 모두 비울까요?');
      if (!ok) return;

      savedKeywords = [];
      renderSavedKeywords();
      groupResult.innerHTML = '';
      groupInfo.innerText = '아직 그룹화하지 않음';

      if (searchInput.value.trim()) {
        searchKeywords();
      }
    }

    function dedupeSavedKeywords() {
      if (savedKeywords.length === 0) {
        alert('저장된 키워드가 없습니다.');
        return;
      }

      const uniqueMap = new Map();

      savedKeywords.forEach(item => {
        const key = normalizeKeyword(item.keyword);
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, item);
        } else {
          const existing = uniqueMap.get(key);
          if (item.searchVolumeNumber > existing.searchVolumeNumber) {
            uniqueMap.set(key, item);
          }
        }
      });

      const beforeCount = savedKeywords.length;
      savedKeywords = Array.from(uniqueMap.values());

      sortSavedKeywords();
      renderSavedKeywords();
      renderKeywordGroupsSilently();

      const removed = beforeCount - savedKeywords.length;
      alert('중복 제거 완료: ' + removed + '개 정리됨');
    }

    function extractGroupKey(keyword) {
      const cleaned = String(keyword).replace(/\s+/g, '');
      const tokens = cleaned.match(/[가-힣A-Za-z0-9]+/g) || [];

      if (tokens.length === 0) return cleaned;

      const priorityWords = [
        '레깅스','스티커','노트','플래너','봉투','타이머','매트','가방','파우치','모자','팔찌',
        '커버','홀더','거치대','조명','꽃병','테이프','금고','수납함','장식','인형','지갑',
        '케이스','정리함','운동화','슬리퍼','안전화','장바구니','발매트','수건','수납'
      ];

      for (const word of priorityWords) {
        if (cleaned.includes(word)) return word;
      }

      let longest = tokens[0];
      for (const token of tokens) {
        if (token.length > longest.length) {
          longest = token;
        }
      }

      if (longest.length >= 2) return longest;
      return cleaned;
    }

    function buildKeywordGroups() {
      const groups = {};

      savedKeywords.forEach(item => {
        const groupKey = extractGroupKey(item.keyword);

        if (!groups[groupKey]) {
          groups[groupKey] = [];
        }

        groups[groupKey].push(item);
      });

      const entries = Object.entries(groups)
        .map(([key, items]) => {
          items.sort((a, b) => b.searchVolumeNumber - a.searchVolumeNumber);
          return { key, items };
        })
        .sort((a, b) => b.items.length - a.items.length);

      return entries;
    }

    function renderKeywordGroups() {
      if (savedKeywords.length === 0) {
        alert('먼저 저장한 키워드가 있어야 합니다.');
        return;
      }

      const groups = buildKeywordGroups();

      if (groups.length === 0) {
        groupInfo.innerText = '그룹화된 결과 없음';
        groupResult.innerHTML = '<div class="empty">그룹화할 키워드가 없습니다.</div>';
        return;
      }

      groupInfo.innerText = '총 ' + groups.length + '개 그룹';

      let html = '';
      groups.forEach(group => {
        html += `
          <div class="group-box">
            <div class="group-title">${escapeHtml(group.key)} 그룹 (${group.items.length})</div>
            <div class="group-items">
              ${group.items.map(item => `<span class="group-chip">${escapeHtml(item.keyword)}</span>`).join('')}
            </div>
          </div>
        `;
      });

      groupResult.innerHTML = html;
    }

    function renderKeywordGroupsSilently() {
      if (savedKeywords.length === 0) {
        groupInfo.innerText = '아직 그룹화하지 않음';
        groupResult.innerHTML = '';
        return;
      }

      const groups = buildKeywordGroups();
      if (groups.length === 0) {
        groupInfo.innerText = '그룹화된 결과 없음';
        groupResult.innerHTML = '';
        return;
      }

      groupInfo.innerText = '총 ' + groups.length + '개 그룹';
      let html = '';

      groups.forEach(group => {
        html += `
          <div class="group-box">
            <div class="group-title">${escapeHtml(group.key)} 그룹 (${group.items.length})</div>
            <div class="group-items">
              ${group.items.map(item => `<span class="group-chip">${escapeHtml(item.keyword)}</span>`).join('')}
            </div>
          </div>
        `;
      });

      groupResult.innerHTML = html;
    }

    function resetSearch() {
      searchInput.value = '';
      sortOption.value = 'desc';
      maxSearchVolume.value = '0';
      result.innerHTML = '';
      resultCount.innerText = '';
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
function getRepeatedSuffixCandidates(words, minLen = 2, maxLen = 8) {
  const normalizedWords = words
    .map(word => String(word).replace(/\s+/g, '').trim())
    .filter(Boolean);

  const suffixMap = new Map();

  normalizedWords.forEach(word => {
    const seenInWord = new Set();
    const max = Math.min(maxLen, word.length - 1);

    for (let len = minLen; len <= max; len++) {
      const suffix = word.slice(-len);

      if (seenInWord.has(suffix)) continue;
      seenInWord.add(suffix);

      if (!suffixMap.has(suffix)) {
        suffixMap.set(suffix, 0);
      }
      suffixMap.set(suffix, suffixMap.get(suffix) + 1);
    }
  });

  return Array.from(suffixMap.entries())
    .map(([suffix, count]) => ({ suffix, count }))
    .filter(item => {
      if (item.count < 2) return false;

      // 2글자 반복어는 너무 쉽게 잘못 잡히므로 3회 이상 반복될 때만 허용
      if (item.suffix.length === 2 && item.count < 3) return false;

      return true;
    })
    .sort((a, b) => {
      if (b.suffix.length !== a.suffix.length) {
        return b.suffix.length - a.suffix.length;
      }
      return b.count - a.count;
    });
}

function stripRepeatedSuffixOnce(keyword, candidates) {
  const text = String(keyword).replace(/\s+/g, '').trim();

  for (const item of candidates) {
    const suffix = item.suffix;

    if (!text.endsWith(suffix)) continue;
    if (text.length <= suffix.length) continue;

    const trimmed = text.slice(0, text.length - suffix.length).trim();

    if (!trimmed) continue;
    if (trimmed.length < 1) continue;

    return {
      changed: true,
      keyword: trimmed,
      removedSuffix: suffix
    };
  }

  return {
    changed: false,
    keyword: text,
    removedSuffix: ''
  };
}

function cleanupCompressedKeyword(keyword) {
  let text = String(keyword).replace(/\s+/g, '').trim();

  // 너무 짧은 결과 방지
  if (text.length <= 1) return keyword;

  return text;
}

function compressSavedKeywords() {
  if (savedKeywords.length === 0) {
    alert('저장된 키워드가 없습니다.');
    return;
  }

  let working = savedKeywords.map(item => ({
    ...item,
    keyword: String(item.keyword).replace(/\s+/g, '').trim()
  }));

  const removedSuffixes = new Set();
  let totalChanges = 0;

  // 여러 종류의 반복 끝단을 단계적으로 제거
  for (let round = 0; round < 6; round++) {
    const candidates = getRepeatedSuffixCandidates(working.map(item => item.keyword));

    if (candidates.length === 0) {
      break;
    }

    let changedThisRound = 0;

    working = working.map(item => {
      const result = stripRepeatedSuffixOnce(item.keyword, candidates);

      if (result.changed) {
        changedThisRound += 1;
        totalChanges += 1;
        removedSuffixes.add(result.removedSuffix);

        return {
          ...item,
          keyword: cleanupCompressedKeyword(result.keyword)
        };
      }

      return item;
    });

    if (changedThisRound === 0) {
      break;
    }
  }

  // 공백 제거 기준 중복 정리
  const uniqueMap = new Map();

  working.forEach(item => {
    const key = normalizeKeyword(item.keyword);

    if (!uniqueMap.has(key)) {
      uniqueMap.set(key, item);
    } else {
      const existing = uniqueMap.get(key);
      if (item.searchVolumeNumber > existing.searchVolumeNumber) {
        uniqueMap.set(key, item);
      }
    }
  });

  savedKeywords = Array.from(uniqueMap.values());

  sortSavedKeywords();
  renderSavedKeywords();
  renderKeywordGroupsSilently();

  if (removedSuffixes.size === 0) {
    alert('반복 끝단을 찾지 못했습니다.');
    return;
  }

  alert(
    '압축 정리 완료\n' +
    '변경된 키워드 수: ' + totalChanges + '개\n' +
    '제거된 반복 끝단: ' + Array.from(removedSuffixes).join(', ')
  );
}

  const originalKeywords = savedKeywords.map(item => item.keyword);
  const commonSuffix = findCommonSuffix(originalKeywords);

  let compressed = savedKeywords.map(item => {
    let newKeyword = item.keyword;

    if (commonSuffix && newKeyword.replace(/\s+/g, '').endsWith(commonSuffix)) {
      const noSpaceKeyword = newKeyword.replace(/\s+/g, '');
      const trimmed = noSpaceKeyword.slice(0, noSpaceKeyword.length - commonSuffix.length).trim();

      if (trimmed.length >= 1) {
        newKeyword = trimmed;
      }
    }

    return {
      ...item,
      keyword: newKeyword || item.keyword
    };
  });

  const uniqueMap = new Map();

  compressed.forEach(item => {
    const key = normalizeKeyword(item.keyword);

    if (!uniqueMap.has(key)) {
      uniqueMap.set(key, item);
    } else {
      const existing = uniqueMap.get(key);
      if (item.searchVolumeNumber > existing.searchVolumeNumber) {
        uniqueMap.set(key, item);
      }
    }
  });

  savedKeywords = Array.from(uniqueMap.values());

  sortSavedKeywords();
  renderSavedKeywords();
  renderKeywordGroupsSilently();

  if (commonSuffix) {
    alert('압축 정리 완료\n공통 반복어: ' + commonSuffix);
  } else {
    alert('공통 반복어를 찾지 못했습니다.');
  }
}
    renderSavedKeywords();
  </script>
