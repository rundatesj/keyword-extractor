<script>
let keywords = [];
let savedKeywords = [];

document.getElementById('csvFile').addEventListener('change', function () {
  const file = this.files[0];

  if (!file) {
    alert("CSV 파일을 선택하세요.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function (e) {
    const text = e.target.result;
    const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');

    if (rows.length < 2) {
      alert("CSV 데이터가 부족합니다.");
      return;
    }

    const headerCols = parseCSVLine(rows[0]).map(col => cleanText(col));

    alert("CSV 헤더명 확인:\n" + headerCols.join(" | "));

    // 임시로 첫 번째 열과 마지막 숫자열을 자동 추정
    keywords = [];

    for (let i = 1; i < rows.length; i++) {
      const cols = parseCSVLine(rows[i]).map(col => cleanText(col));
      const keyword = cols[0] || '';

      let searchVolume = '0';

      for (let j = cols.length - 1; j >= 0; j--) {
        const value = cols[j];
        if (/^[\d,]+$/.test(value)) {
          searchVolume = value;
          break;
        }
      }

      if (keyword) {
        keywords.push({
          keyword,
          searchVolume,
          searchVolumeNumber: toNumber(searchVolume)
        });
      }
    }

    document.getElementById('fileStatus').innerText =
      `업로드 완료: ${file.name} / 총 ${keywords.length}개 키워드`;

    document.getElementById('result').innerHTML = '';
    document.getElementById('resultCount').innerText = '';
  };

  reader.readAsText(file, 'UTF-8');
});
</script>
