<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV / 엑셀 키워드 추출기</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f4f7fb;
      color: #1f2937;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 42px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.5px;
    }

    h3 {
      margin-bottom: 14px;
      font-size: 28px;
      font-weight: 700;
      color: #111827;
    }

    input[type="file"],
    input[type="text"],
    input[type="number"],
    select,
    button,
    textarea {
      font-family: inherit;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      border: 1px solid #d6deea;
      background: #ffffff;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #7aa2ff;
      box-shadow: 0 0 0 4px rgba(122, 162, 255, 0.15);
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      max-width: 220px;
      padding: 12px 14px;
      font-size: 15px;
      box-sizing: border-box;
      border-radius: 12px;
    }

    .wide-input {
      max-width: 620px !important;
    }

    button {
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #cfd8e6;
      border-radius: 12px;
      background: #ffffff;
      color: #1f2937;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #eef4ff;
      border-color: #9bb8ff;
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .box {
      border: 1px solid #e3eaf5;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 24px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    .count {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .empty {
      color: #94a3b8;
    }

    .result-item,
    .saved-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #edf2f7;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .keyword {
      font-weight: 700;
      word-break: break-all;
      font-size: 18px;
      color: #111827;
    }

    .meta {
      font-size: 13px;
      color: #64748b;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eaf2ff;
      color: #315ea8;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .add-btn {
      background: #eaf3ff;
      border-color: #b9d3ff;
      color: #2457a6;
    }

    .add-btn:hover {
      background: #dceaff;
    }

    .remove-btn {
      background: #fff1f2;
      border-color: #ffc9d2;
      color: #b42318;
    }

    .remove-btn:hover {
      background: #ffe4e8;
    }

    .copy-box {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      font-size: 14px;
      border: 1px solid #d6deea;
      border-radius: 14px;
      resize: vertical;
      box-sizing: border-box;
      background: #fbfdff;
    }

    .top-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-top: 14px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      min-width: 180px;
      gap: 8px;
    }

    .control-group label {
      font-size: 13px;
      color: #475569;
      font-weight: 700;
      padding-left: 2px;
    }

    .debug {
      font-size: 12px;
      color: #64748b;
      background: #f8fbff;
      border: 1px dashed #d7e3f4;
      padding: 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      margin-top: 12px;
    }

    .group-box {
      border: 1px solid #e7eef8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fbfdff;
    }

    .group-title {
      font-weight: 700;
      margin-bottom: 10px;
      color: #1e293b;
    }

    .group-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .group-chip {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: #335c99;
      font-size: 13px;
      font-weight: 600;
    }

    .freq-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #edf2f7;
      gap: 12px;
    }

    .freq-word {
      font-weight: 700;
      color: #111827;
    }

    .freq-count {
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h2>CSV 키워드 추출기</h2>

  <div class="box">
    <div class="control-group" style="max-width: 420px;">
      <label for="fileInput">CSV 또는 엑셀 파일 업로드</label>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
    </div>
    <div id="fileStatus" class="count">아직 업로드된 파일 없음</div>
    <div id="debugInfo" class="debug">헤더 정보 없음</div>
  </div>

  <div class="box">
    <div class="control-group" style="max-width: 640px; margin-bottom: 8px;">
      <label for="searchInput">검색할 키워드 입력</label>
      <input type="text" id="searchInput" class="wide-input" placeholder="예: 남자, 슬리퍼, 여름, 사무실실내화,">
    </div>

    <div class="top-actions">
      <div class="control-group">
        <label for="sortOption">정렬</label>
        <select id="sortOption">
          <option value="desc">검색수 높은순</option>
          <option value="asc">검색수 낮은순</option>
        </select>
      </div>

      <div class="control-group">
        <label for="minSearchVolume">최소 검색수</label>
        <input type="number" id="minSearchVolume" placeholder="예: 500" min="0">
      </div>

      <div class="control-group">
        <label for="maxSearchVolume">최대 검색수</label>
        <input type="number" id="maxSearchVolume" placeholder="예: 2000" min="0">
      </div>

      <div class="control-group">
        <label for="keywordColumn">키워드 컬럼</label>
        <select id="keywordColumn">
          <option value="">자동 선택</option>
        </select>
      </div>

      <div class="control-group">
        <label for="searchVolumeColumn">검색수 컬럼</label>
        <select id="searchVolumeColumn">
          <option value="">자동 선택</option>
        </select>
      </div>
    </div>

    <div class="top-actions" style="margin-top: 18px;">
      <button id="searchBtn">검색</button>
      <button id="resetBtn">검색 초기화</button>
    </div>
  </div>

  <div class="box">
    <h3>검색 결과</h3>
    <div id="resultCount" class="count"></div>
    <div id="result"></div>
  </div>

  <div class="box">
    <h3>저장한 키워드</h3>

    <div class="control-group" style="max-width: 100%;">
      <label for="savedText">복사용 모음</label>
      <textarea id="savedText" class="copy-box" readonly></textarea>
    </div>

    <br>

    <div class="control-group" style="max-width: 100%;">
      <label for="workArea">상품명 조합 작업칸</label>
      <textarea id="workArea" class="copy-box" placeholder="복사용 모음을 복사해서 여기 붙여넣고, 배열 정리나 편집을 해보세요."></textarea>
    </div>

    <br>

    <div id="savedCount" class="count">총 0개</div>
    <div class="top-actions">
      <button id="copyBtn">저장 키워드 복사</button>
      <button id="copyToWorkBtn">작업칸으로 복사</button>
      <button id="clearWorkBtn">작업칸 비우기</button>
      <button id="clearBtn">저장 목록 비우기</button>
      <button id="dedupeBtn">중복 제거</button>
      <button id="compressBtn">압축 정리</button>
      <button id="groupBtn">키워드 그룹 보기</button>
      <button id="freqBtn">키워드 빈도 분석</button>
    </div>
    <div id="savedList"></div>
  </div>

  <div class="box">
    <h3>키워드 그룹</h3>
    <div id="groupInfo" class="count">아직 그룹화하지 않음</div>
    <div id="groupResult"></div>
  </div>

  <div class="box">
    <h3>키워드 빈도 분석</h3>
    <div id="freqInfo" class="count">아직 분석하지 않음</div>
    <div id="freqResult"></div>
  </div>

  <script>
    let keywords = [];
    let savedKeywords = [];
    let parsedRows = [];
    let headers = [];
    let hasHeader = false;
    let headerRowIndex = 0;

    const fileInput = document.getElementById('fileInput');
    const fileStatus = document.getElementById('fileStatus');
    const debugInfo = document.getElementById('debugInfo');
    const searchInput = document.getElementById('searchInput');
    const sortOption = document.getElementById('sortOption');
    const minSearchVolume = document.getElementById('minSearchVolume');
    const maxSearchVolume = document.getElementById('maxSearchVolume');
    const keywordColumn = document.getElementById('keywordColumn');
    const searchVolumeColumn = document.getElementById('searchVolumeColumn');
    const result = document.getElementById('result');
    const resultCount = document.getElementById('resultCount');
    const savedList = document.getElementById('savedList');
    const savedCount = document.getElementById('savedCount');
    const savedText = document.getElementById('savedText');
    const workArea = document.getElementById('workArea');
    const groupInfo = document.getElementById('groupInfo');
    const groupResult = document.getElementById('groupResult');
    const freqInfo = document.getElementById('freqInfo');
    const freqResult = document.getElementById('freqResult');

    document.getElementById('searchBtn').addEventListener('click', searchKeywords);
    document.getElementById('resetBtn').addEventListener('click', resetSearch);
    document.getElementById('copyBtn').addEventListener('click', copySavedKeywords);
    document.getElementById('copyToWorkBtn').addEventListener('click', copyToWorkArea);
    document.getElementById('clearWorkBtn').addEventListener('click', clearWorkArea);
    document.getElementById('clearBtn').addEventListener('click', clearSavedKeywords);
    document.getElementById('dedupeBtn').addEventListener('click', dedupeSavedKeywords);
    document.getElementById('compressBtn').addEventListener('click', compressSavedKeywords);
    document.getElementById('groupBtn').addEventListener('click', renderKeywordGroups);
    document.getElementById('freqBtn').addEventListener('click', renderKeywordFrequency);

    fileInput.addEventListener('change', handleFileUpload);

    searchInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') searchKeywords();
    });

    sortOption.addEventListener('change', rerunSearchIfReady);
    minSearchVolume.addEventListener('input', rerunSearchIfReady);
    maxSearchVolume.addEventListener('input', rerunSearchIfReady);
    keywordColumn.addEventListener('change', rebuildAndRerun);
    searchVolumeColumn.addEventListener('change', rebuildAndRerun);

    function rerunSearchIfReady() {
      if (keywords.length > 0) searchKeywords();
    }

    function rebuildAndRerun() {
      if (parsedRows.length > 0) {
        rebuildKeywordsFromRows();
        searchKeywords();
      }
    }

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) {
        alert('파일을 선택하세요.');
        return;
      }

      const fileName = file.name.toLowerCase();

      if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
        const reader = new FileReader();

        reader.onload = function(event) {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

            if (!jsonRows || jsonRows.length === 0) {
              alert('엑셀 데이터가 비어 있습니다.');
              return;
            }

            const rows = jsonRows
              .map(row => row.map(cleanText))
              .filter(row => row.some(cell => String(cell).trim() !== ''));

            processParsedRows(rows, file.name);
          } catch (error) {
            console.error(error);
            alert('엑셀 처리 중 오류가 발생했습니다.');
          }
        };

        reader.readAsArrayBuffer(file);
      } else {
        const reader = new FileReader();

        reader.onload = function(event) {
          try {
            const text = event.target.result;
            const rawRows = text.split(/\r?\n/).filter(row => row.trim() !== '');
            if (rawRows.length === 0) {
              alert('CSV 내용이 비어 있습니다.');
              return;
            }

            const rows = rawRows
              .map(row => parseCSVLine(row).map(cleanText))
              .filter(row => row.some(cell => String(cell).trim() !== ''));

            processParsedRows(rows, file.name);
          } catch (error) {
            console.error(error);
            alert('CSV 처리 중 오류가 발생했습니다.');
          }
        };

        reader.readAsText(file, 'UTF-8');
      }
    }

    function processParsedRows(rows, fileName) {
      parsedRows = rows;
      headerRowIndex = findHeaderRowIndex(rows);
      hasHeader = headerRowIndex !== -1;

      if (hasHeader) {
        headers = rows[headerRowIndex].map(cleanText);
        populateColumnSelects(headers);
      } else {
        headers = [];
        keywordColumn.innerHTML = '<option value="">자동 선택</option>';
        searchVolumeColumn.innerHTML = '<option value="">자동 선택</option>';
      }

      rebuildKeywordsFromRows();

      fileStatus.innerText = '업로드 완료: ' + fileName + ' / 총 ' + keywords.length + '개 키워드';
      debugInfo.innerText = hasHeader
        ? '헤더 감지: ' + headers.join(' | ')
        : '헤더 없음으로 처리됨 / 첫 행도 데이터로 읽음';

      result.innerHTML = '';
      resultCount.innerText = '';
      groupResult.innerHTML = '';
      groupInfo.innerText = '아직 그룹화하지 않음';
      freqResult.innerHTML = '';
      freqInfo.innerText = '아직 분석하지 않음';

      if (keywords.length === 0) {
        alert('읽을 수 있는 데이터가 없습니다. 파일 구조를 확인해주세요.');
      }
    }

    function findHeaderRowIndex(rows) {
      const scanLimit = Math.min(rows.length, 10);

      for (let i = 0; i < scanLimit; i++) {
        const row = (rows[i] || []).map(cell => normalizeHeaderText(cell));
        if (row.length === 0) continue;

        const hasKeyword = row.some(cell =>
          cell === '키워드' || cell === '연관키워드' || cell === '검색키워드'
        );

        const hasSearchVolume = row.some(cell =>
          cell === '총검색수' || cell === '검색수' || cell === 'pc검색' || cell === '모바일검색'
        );

        if (hasKeyword || hasSearchVolume) {
          return i;
        }
      }

      return -1;
    }

    function rebuildKeywordsFromRows() {
      const startIndex = hasHeader ? headerRowIndex + 1 : 0;
      const selectedKeywordIndex = keywordColumn.value === '' ? null : Number(keywordColumn.value);
      const selectedSearchIndex = searchVolumeColumn.value === '' ? null : Number(searchVolumeColumn.value);

      const autoKeywordIndex = findAutoKeywordIndex(headers);
      const autoSearchIndex = findAutoSearchVolumeIndex(headers);

      keywords = [];

      for (let i = startIndex; i < parsedRows.length; i++) {
        const cols = parsedRows[i] || [];
        if (cols.length === 0) continue;

        let keywordIndexToUse = 0;

        if (selectedKeywordIndex !== null && !Number.isNaN(selectedKeywordIndex)) {
          keywordIndexToUse = selectedKeywordIndex;
        } else if (hasHeader && autoKeywordIndex !== -1) {
          keywordIndexToUse = autoKeywordIndex;
        }

        const keyword = cleanText(cols[keywordIndexToUse] || '');
        if (!keyword) continue;
        if (/^https?:\/\//i.test(keyword)) continue;

        let searchVolumeNumber = 0;

        if (selectedSearchIndex !== null && !Number.isNaN(selectedSearchIndex)) {
          searchVolumeNumber = toNumber(cols[selectedSearchIndex] || 0);
        } else if (hasHeader && autoSearchIndex !== -1) {
          searchVolumeNumber = toNumber(cols[autoSearchIndex] || 0);
        } else {
          searchVolumeNumber = sumNumericColumns(cols, 1);
        }

        keywords.push({
          keyword: keyword,
          searchVolume: String(searchVolumeNumber),
          searchVolumeNumber: searchVolumeNumber
        });
      }
    }

    function populateColumnSelects(headers) {
      keywordColumn.innerHTML = '<option value="">자동 선택</option>';
      searchVolumeColumn.innerHTML = '<option value="">자동 선택</option>';

      headers.forEach((header, index) => {
        const label = header || `컬럼 ${index + 1}`;

        const keywordOption = document.createElement('option');
        keywordOption.value = String(index);
        keywordOption.textContent = label;
        keywordColumn.appendChild(keywordOption);

        const searchOption = document.createElement('option');
        searchOption.value = String(index);
        searchOption.textContent = label;
        searchVolumeColumn.appendChild(searchOption);
      });

      const autoKeywordIndex = findAutoKeywordIndex(headers);
      const autoSearchIndex = findAutoSearchVolumeIndex(headers);

      keywordColumn.value = autoKeywordIndex !== -1 ? String(autoKeywordIndex) : '';
      searchVolumeColumn.value = autoSearchIndex !== -1 ? String(autoSearchIndex) : '';
    }

    function normalizeHeaderText(text) {
      return String(text || '').toLowerCase().replace(/\s+/g, '').trim();
    }

    function findAutoKeywordIndex(headers) {
      const normalizedHeaders = headers.map(normalizeHeaderText);

      const candidates = [
        '키워드',
        '연관키워드',
        '검색키워드'
      ];

      for (const candidate of candidates) {
        const index = normalizedHeaders.findIndex(h => h === candidate);
        if (index !== -1) return index;
      }

      return -1;
    }

    function findAutoSearchVolumeIndex(headers) {
      const normalizedHeaders = headers.map(normalizeHeaderText);

      const candidates = [
        '총검색수',
        '검색수',
        'pc검색',
        '모바일검색'
      ];

      for (const candidate of candidates) {
        const index = normalizedHeaders.findIndex(h => h === candidate);
        if (index !== -1) return index;
      }

      return -1;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function cleanText(text) {
      return String(text || '').trim().replace(/^"|"$/g, '');
    }

    function toNumber(value) {
      const n = Number(String(value).replace(/,/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function looksNumeric(value) {
      return /^[\d,\.\-]+$/.test(String(value).trim());
    }

    function sumNumericColumns(cols, startIndex) {
      let total = 0;
      for (let i = startIndex; i < cols.length; i++) {
        const value = cleanText(cols[i]);
        if (looksNumeric(value)) {
          total += toNumber(value);
        }
      }
      return total;
    }

    function normalizeKeyword(text) {
      return String(text).toLowerCase().replace(/\s+/g, '').trim();
    }

    function classifyMatch(keyword, query) {
      const keywordLower = keyword.toLowerCase().trim();
      const queryLower = query.toLowerCase().trim();

      if (!queryLower) return null;
      if (keywordLower === queryLower) return '완전일치';
      if (keywordLower.includes(queryLower)) return '포함일치';

      const parts = queryLower.split(/\s+/).filter(Boolean);
      if (parts.length > 1) {
        const allMatched = parts.every(part => keywordLower.includes(part));
        if (allMatched) return '부분일치';
      }

      if (queryLower.length >= 2 && keywordLower.indexOf(queryLower) !== -1) {
        return '내부단어포함';
      }

      return null;
    }

    function searchKeywords() {
      if (keywords.length === 0) {
        alert('먼저 파일을 업로드하세요.');
        return;
      }

      const query = searchInput.value.trim();
      const sortValue = sortOption.value;
      const minValue = Number(minSearchVolume.value || 0);
      const maxValue = Number(maxSearchVolume.value || 0);

      const filtered = keywords
        .map(item => {
          let matchType = '필터결과';

          if (query) {
            matchType = classifyMatch(item.keyword, query);
            if (!matchType) return null;
          }

          if (item.searchVolumeNumber < minValue) return null;
          if (maxValue !== 0 && item.searchVolumeNumber > maxValue) return null;

          return {
            keyword: item.keyword,
            searchVolume: item.searchVolume,
            searchVolumeNumber: item.searchVolumeNumber,
            matchType: matchType
          };
        })
        .filter(Boolean);

      const uniqueMap = new Map();
      filtered.forEach(item => {
        const key = normalizeKeyword(item.keyword);
        if (!uniqueMap.has(key)) uniqueMap.set(key, item);
      });

      const items = Array.from(uniqueMap.values());

      const priority = {
        '완전일치': 1,
        '포함일치': 2,
        '부분일치': 3,
        '내부단어포함': 4,
        '필터결과': 5
      };

      items.sort((a, b) => {
        if (query && priority[a.matchType] !== priority[b.matchType]) {
          return priority[a.matchType] - priority[b.matchType];
        }
        if (sortValue === 'asc') return a.searchVolumeNumber - b.searchVolumeNumber;
        return b.searchVolumeNumber - a.searchVolumeNumber;
      });

      renderResults(items);
    }

    function renderResults(items) {
      if (items.length === 0) {
        resultCount.innerText = '총 0개';
        result.innerHTML = '<div class="empty">일치하는 키워드가 없습니다.</div>';
        return;
      }

      resultCount.innerText = '총 ' + items.length + '개';

      let html = '';
      items.forEach(item => {
        const alreadyAdded = savedKeywords.some(saved => normalizeKeyword(saved.keyword) === normalizeKeyword(item.keyword));

        html += `
          <div class="result-item">
            <div class="left">
              <div class="keyword">${escapeHtml(item.keyword)}</div>
              <div class="meta">
                ${item.matchType === '필터결과' ? '' : `<span class="tag">${escapeHtml(item.matchType)}</span>`}
                <span>검색수: ${escapeHtml(String(item.searchVolume))}</span>
              </div>
            </div>
            <div class="actions">
              <button
                class="add-btn"
                data-keyword="${encodeURIComponent(item.keyword)}"
                data-volume="${encodeURIComponent(String(item.searchVolume))}"
                ${alreadyAdded ? 'disabled' : ''}
              >
                ${alreadyAdded ? '추가됨' : '추가'}
              </button>
            </div>
          </div>
        `;
      });

      result.innerHTML = html;

      const addButtons = result.querySelectorAll('.add-btn');
      addButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          addKeyword(this.dataset.keyword, this.dataset.volume);
        });
      });
    }

    function addKeyword(encodedKeyword, encodedSearchVolume) {
      const keyword = decodeURIComponent(encodedKeyword);
      const searchVolume = decodeURIComponent(encodedSearchVolume);

      const exists = savedKeywords.some(item => normalizeKeyword(item.keyword) === normalizeKeyword(keyword));
      if (exists) return;

      savedKeywords.push({
        keyword: keyword,
        searchVolume: searchVolume,
        searchVolumeNumber: toNumber(searchVolume)
      });

      sortSavedKeywords();
      renderSavedKeywords();

      if (keywords.length > 0) searchKeywords();
    }

    function removeKeyword(encodedKeyword) {
      const keyword = decodeURIComponent(encodedKeyword);
      savedKeywords = savedKeywords.filter(item => normalizeKeyword(item.keyword) !== normalizeKeyword(keyword));

      sortSavedKeywords();
      renderSavedKeywords();
      renderKeywordGroupsSilently();
      renderKeywordFrequencySilently();

      if (keywords.length > 0) searchKeywords();
    }

    function sortSavedKeywords() {
      savedKeywords.sort((a, b) => b.searchVolumeNumber - a.searchVolumeNumber);
    }

    function renderSavedKeywords() {
      sortSavedKeywords();
      savedCount.innerText = '총 ' + savedKeywords.length + '개';

      if (savedKeywords.length === 0) {
        savedList.innerHTML = '<div class="empty">저장된 키워드가 없습니다.</div>';
        savedText.value = '';
        return;
      }

      let html = '';
      savedKeywords.forEach(item => {
        html += `
          <div class="saved-item">
            <div class="left">
              <div class="keyword">${escapeHtml(item.keyword)}</div>
              <div class="meta">검색수: ${escapeHtml(String(item.searchVolume))}</div>
            </div>
            <div class="actions">
              <button
                class="remove-btn"
                data-keyword="${encodeURIComponent(item.keyword)}"
              >
                삭제
              </button>
            </div>
          </div>
        `;
      });

      savedList.innerHTML = html;
      savedText.value = savedKeywords.map(item => item.keyword).join(' ');

      const removeButtons = savedList.querySelectorAll('.remove-btn');
      removeButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          removeKeyword(this.dataset.keyword);
        });
      });
    }

    function copySavedKeywords() {
      const text = savedText.value.trim();
      if (!text) {
        alert('복사할 저장 키워드가 없습니다.');
        return;
      }

      navigator.clipboard.writeText(text)
        .then(() => alert('저장 키워드를 복사했습니다.'))
        .catch(() => alert('복사에 실패했습니다.'));
    }

    function clearSavedKeywords() {
      if (savedKeywords.length === 0) return;

      const ok = confirm('저장한 키워드를 모두 비울까요?');
      if (!ok) return;

      savedKeywords = [];
      renderSavedKeywords();
      groupResult.innerHTML = '';
      groupInfo.innerText = '아직 그룹화하지 않음';
      freqResult.innerHTML = '';
      freqInfo.innerText = '아직 분석하지 않음';

      if (keywords.length > 0) searchKeywords();
    }

    function dedupeSavedKeywords() {
      if (savedKeywords.length === 0) {
        alert('저장된 키워드가 없습니다.');
        return;
      }

      const uniqueMap = new Map();

      savedKeywords.forEach(item => {
        const key = normalizeKeyword(item.keyword);
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, item);
        } else {
          const existing = uniqueMap.get(key);
          if (item.searchVolumeNumber > existing.searchVolumeNumber) {
            uniqueMap.set(key, item);
          }
        }
      });

      const beforeCount = savedKeywords.length;
      savedKeywords = Array.from(uniqueMap.values());

      sortSavedKeywords();
      renderSavedKeywords();
      renderKeywordGroupsSilently();
      renderKeywordFrequencySilently();

      const removed = beforeCount - savedKeywords.length;
      alert('중복 제거 완료: ' + removed + '개 정리됨');
    }

    function extractGroupKey(keyword) {
      const cleaned = String(keyword).replace(/\s+/g, '');
      const tokens = cleaned.match(/[가-힣A-Za-z0-9]+/g) || [];
      if (tokens.length === 0) return cleaned;

      const priorityWords = [
        '레깅스','스티커','노트','플래너','봉투','타이머','매트','가방','파우치','모자','팔찌',
        '커버','홀더','거치대','조명','꽃병','테이프','금고','수납함','장식','인형','지갑',
        '케이스','정리함','운동화','슬리퍼','안전화','장바구니','발매트','수건','수납'
      ];

      for (const word of priorityWords) {
        if (cleaned.includes(word)) return word;
      }

      let longest = tokens[0];
      for (const token of tokens) {
        if (token.length > longest.length) longest = token;
      }

      return longest.length >= 2 ? longest : cleaned;
    }

    function buildKeywordGroups() {
      const groups = {};

      savedKeywords.forEach(item => {
        const groupKey = extractGroupKey(item.keyword);
        if (!groups[groupKey]) groups[groupKey] = [];
        groups[groupKey].push(item);
      });

      return Object.entries(groups)
        .map(([key, items]) => {
          items.sort((a, b) => b.searchVolumeNumber - a.searchVolumeNumber);
          return { key, items };
        })
        .sort((a, b) => b.items.length - a.items.length);
    }

    function renderKeywordGroups() {
      if (savedKeywords.length === 0) {
        alert('먼저 저장한 키워드가 있어야 합니다.');
        return;
      }
      renderKeywordGroupsSilently();
    }

    function renderKeywordGroupsSilently() {
      if (savedKeywords.length === 0) {
        groupInfo.innerText = '아직 그룹화하지 않음';
        groupResult.innerHTML = '';
        return;
      }

      const groups = buildKeywordGroups();

      if (groups.length === 0) {
        groupInfo.innerText = '그룹화된 결과 없음';
        groupResult.innerHTML = '';
        return;
      }

      groupInfo.innerText = '총 ' + groups.length + '개 그룹';

      let html = '';
      groups.forEach(group => {
        html += `
          <div class="group-box">
            <div class="group-title">${escapeHtml(group.key)} 그룹 (${group.items.length})</div>
            <div class="group-items">
              ${group.items.map(item => `<span class="group-chip">${escapeHtml(item.keyword)}</span>`).join('')}
            </div>
          </div>
        `;
      });

      groupResult.innerHTML = html;
    }

    function renderKeywordFrequency() {
      if (savedKeywords.length === 0) {
        alert('먼저 저장한 키워드가 있어야 합니다.');
        return;
      }
      renderKeywordFrequencySilently();
    }

    function renderKeywordFrequencySilently() {
      if (savedKeywords.length === 0) {
        freqInfo.innerText = '아직 분석하지 않음';
        freqResult.innerHTML = '';
        return;
      }

      const freqMap = new Map();

      savedKeywords.forEach(item => {
        const text = String(item.keyword).replace(/([가-힣]+|[A-Za-z]+|\d+)/g, ' $1 ').trim();
        const tokens = text.split(/\s+/).filter(Boolean);

        tokens.forEach(token => {
          if (token.length < 2) return;
          freqMap.set(token, (freqMap.get(token) || 0) + 1);
        });
      });

      const items = Array.from(freqMap.entries())
        .map(([word, count]) => ({ word, count }))
        .sort((a, b) => b.count - a.count || a.word.localeCompare(b.word, 'ko'))
        .slice(0, 50);

      if (items.length === 0) {
        freqInfo.innerText = '분석 결과 없음';
        freqResult.innerHTML = '<div class="empty">빈도 분석할 단어가 없습니다.</div>';
        return;
      }

      freqInfo.innerText = '상위 ' + items.length + '개 단어';

      let html = '';
      items.forEach(item => {
        html += `
          <div class="freq-item">
            <div class="freq-word">${escapeHtml(item.word)}</div>
            <div class="freq-count">${item.count}회</div>
          </div>
        `;
      });

      freqResult.innerHTML = html;
    }

    function resetSearch() {
      searchInput.value = '';
      minSearchVolume.value = '';
      maxSearchVolume.value = '';
      sortOption.value = 'desc';
      result.innerHTML = '';
      resultCount.innerText = '';
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getRepeatedSuffixCandidates(words, minLen = 2, maxLen = 8) {
      const normalizedWords = words
        .map(word => String(word).replace(/\s+/g, '').trim())
        .filter(Boolean);

      const suffixMap = new Map();

      normalizedWords.forEach(word => {
        const seenInWord = new Set();
        const max = Math.min(maxLen, word.length - 1);

        for (let len = minLen; len <= max; len++) {
          const suffix = word.slice(-len);

          if (seenInWord.has(suffix)) continue;
          seenInWord.add(suffix);

          if (!suffixMap.has(suffix)) suffixMap.set(suffix, 0);
          suffixMap.set(suffix, suffixMap.get(suffix) + 1);
        }
      });

      return Array.from(suffixMap.entries())
        .map(([suffix, count]) => ({ suffix, count }))
        .filter(item => {
          if (item.count < 2) return false;
          if (item.suffix.length === 2 && item.count < 3) return false;
          return true;
        })
        .sort((a, b) => {
          if (b.suffix.length !== a.suffix.length) return b.suffix.length - a.suffix.length;
          return b.count - a.count;
        });
    }

    function stripRepeatedSuffixOnce(keyword, candidates) {
      const text = String(keyword).replace(/\s+/g, '').trim();

      for (const item of candidates) {
        const suffix = item.suffix;
        if (!text.endsWith(suffix)) continue;
        if (text.length <= suffix.length) continue;

        const trimmed = text.slice(0, text.length - suffix.length).trim();
        if (!trimmed) continue;
        if (trimmed.length < 1) continue;

        return {
          changed: true,
          keyword: trimmed,
          removedSuffix: suffix
        };
      }

      return {
        changed: false,
        keyword: text,
        removedSuffix: ''
      };
    }

    function cleanupCompressedKeyword(keyword) {
      const text = String(keyword).replace(/\s+/g, '').trim();
      if (text.length <= 1) return keyword;
      return text;
    }

    function compressSavedKeywords() {
      if (savedKeywords.length === 0) {
        alert('저장된 키워드가 없습니다.');
        return;
      }

      let working = savedKeywords.map(item => ({
        ...item,
        keyword: String(item.keyword).replace(/\s+/g, '').trim()
      }));

      const removedSuffixes = new Set();
      let totalChanges = 0;

      for (let round = 0; round < 6; round++) {
        const candidates = getRepeatedSuffixCandidates(working.map(item => item.keyword));
        if (candidates.length === 0) break;

        let changedThisRound = 0;

        working = working.map(item => {
          const result = stripRepeatedSuffixOnce(item.keyword, candidates);

          if (result.changed) {
            changedThisRound += 1;
            totalChanges += 1;
            removedSuffixes.add(result.removedSuffix);

            return {
              ...item,
              keyword: cleanupCompressedKeyword(result.keyword)
            };
          }

          return item;
        });

        if (changedThisRound === 0) break;
      }

      const uniqueMap = new Map();

      working.forEach(item => {
        const key = normalizeKeyword(item.keyword);
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, item);
        } else {
          const existing = uniqueMap.get(key);
          if (item.searchVolumeNumber > existing.searchVolumeNumber) {
            uniqueMap.set(key, item);
          }
        }
      });

      savedKeywords = Array.from(uniqueMap.values());

      sortSavedKeywords();
      renderSavedKeywords();
      renderKeywordGroupsSilently();
      renderKeywordFrequencySilently();

      if (removedSuffixes.size === 0) {
        alert('반복 끝단을 찾지 못했습니다.');
        return;
      }

      alert(
        '압축 정리 완료\n' +
        '변경된 키워드 수: ' + totalChanges + '개\n' +
        '제거된 반복 끝단: ' + Array.from(removedSuffixes).join(', ')
      );
    }

    function copyToWorkArea() {
      const text = savedText.value.trim();
      if (!text) {
        alert('복사할 저장 키워드가 없습니다.');
        return;
      }

      workArea.value = text;
      workArea.focus();
    }

    function clearWorkArea() {
      workArea.value = '';
      workArea.focus();
    }

    renderSavedKeywords();
  </script>
