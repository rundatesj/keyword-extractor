<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>키워드 추출기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }

    h2, h3 {
      margin-bottom: 10px;
    }

    input[type="file"],
    input[type="text"],
    button {
      margin-top: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      width: 100%;
      max-width: 500px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .result-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      margin-left: 8px;
      background: #f2f2f2;
    }

    .count {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .empty {
      color: #999;
    }
  </style>
</head>
<body>

  <h2>CSV 키워드 추출기</h2>

  <div class="box">
    <div>CSV 파일 업로드</div>
    <input type="file" id="csvFile" accept=".csv">
    <div id="fileStatus" class="count">아직 업로드된 파일 없음</div>
  </div>

  <div class="box">
    <div>검색할 키워드 입력</div>
    <input type="text" id="searchInput" placeholder="예: 레깅스, 3부, 힙업 여자">
    <br>
    <button onclick="searchKeywords()">검색</button>
    <button onclick="resetSearch()">초기화</button>
  </div>

  <div class="box">
    <h3>검색 결과</h3>
    <div id="resultCount" class="count"></div>
    <div id="result"></div>
  </div>

  <script>
    let keywords = []; // CSV에서 읽은 전체 키워드 저장

    document.getElementById('csvFile').addEventListener('change', function () {
      const file = this.files[0];

      if (!file) {
        alert("CSV 파일을 선택하세요.");
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        const text = e.target.result;
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');

        keywords = [];

        // 첫 줄은 헤더라고 가정하고 2번째 줄부터 읽음
        for (let i = 1; i < rows.length; i++) {
          const cols = rows[i].split(',');
          const keyword = cols[0]?.trim().replace(/^"|"$/g, '');

          if (keyword) {
            keywords.push(keyword);
          }
        }

        document.getElementById('fileStatus').innerText =
          `업로드 완료: ${file.name} / 총 ${keywords.length}개 키워드`;

        document.getElementById('result').innerHTML = '';
        document.getElementById('resultCount').innerText = '';
      };

      reader.readAsText(file, 'UTF-8');
    });

    function classifyMatch(keyword, query) {
      const keywordLower = keyword.toLowerCase().trim();
      const queryLower = query.toLowerCase().trim();

      if (!queryLower) return null;

      // 1. 완전일치
      if (keywordLower === queryLower) {
        return '완전일치';
      }

      // 2. 포함일치
      if (keywordLower.includes(queryLower)) {
        return '포함일치';
      }

      // 3. 내부단어 포함
      // 예: 검색어 "3부" -> "3부레깅스"
      // 예: 검색어 "레깅스" -> "골반뽕레깅스"
      if (queryLower.length >= 2 && keywordLower.indexOf(queryLower) !== -1) {
        return '내부단어포함';
      }

      // 4. 부분일치
      // 예: "힙업 여자" 입력 -> "힙업여자레깅스"
      const parts = queryLower.split(/\s+/).filter(Boolean);
      if (parts.length > 1) {
        const allMatched = parts.every(part => keywordLower.includes(part));
        if (allMatched) {
          return '부분일치';
        }
      }

      return null;
    }

    function searchKeywords() {
      if (keywords.length === 0) {
        alert("먼저 CSV 파일을 업로드하세요.");
        return;
      }

      const query = document.getElementById('searchInput').value.trim();

      if (!query) {
        alert("검색어를 입력하세요.");
        return;
      }

      const results = [];

      for (const keyword of keywords) {
        const matchType = classifyMatch(keyword, query);
        if (matchType) {
          results.push({
            keyword,
            matchType
          });
        }
      }

      // 중복 제거
      const uniqueResults = [];
      const seen = new Set();

      for (const item of results) {
        const key = item.keyword + '||' + item.matchType;
        if (!seen.has(key)) {
          seen.add(key);
          uniqueResults.push(item);
        }
      }

      // 우선순위 정렬
      const priority = {
        '완전일치': 1,
        '포함일치': 2,
        '내부단어포함': 3,
        '부분일치': 4
      };

      uniqueResults.sort((a, b) => {
        return priority[a.matchType] - priority[b.matchType];
      });

      const resultBox = document.getElementById('result');
      const countBox = document.getElementById('resultCount');

      if (uniqueResults.length === 0) {
        countBox.innerText = '총 0개';
        resultBox.innerHTML = '<div class="empty">일치하는 키워드가 없습니다.</div>';
        return;
      }

      countBox.innerText = `총 ${uniqueResults.length}개`;

      let html = '';
      uniqueResults.forEach(item => {
        html += `
          <div class="result-item">
            ${item.keyword}
            <span class="tag">${item.matchType}</span>
          </div>
        `;
      });

      resultBox.innerHTML = html;
    }

    function resetSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('result').innerHTML = '';
      document.getElementById('resultCount').innerText = '';
    }

    // 엔터키로도 검색
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchKeywords();
      }
    });
  </script>

</body>
</html>
